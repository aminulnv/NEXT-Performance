# Full-stack deploy: https://next-performance.onrender.com
# Dashboard UI + API on one service (recommended primary URL).
services:
  - type: web
    name: next-performance
    runtime: node
    plan: free
    # Install devDependencies (vite, typescript) even when NODE_ENV=production
    # NODE_ENV=production skips devDependencies unless we opt in (typescript, vite, @types/react).
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_BYPASS_AUTH
        value: false
      - key: APP_URL
        value: https://next-performance.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ALLOWED_EMAIL_DOMAIN
        sync: false
      - key: REVOLUT_EMAIL
        sync: false
      - key: REVOLUT_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
